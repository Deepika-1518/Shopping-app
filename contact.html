<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Shopping Site</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background-color:#f5f5f5; color:#333;}
        header {background-color:#4CAF50; color:white; text-align:center; padding:20px;}
        nav {background-color:#333; overflow:hidden;}
        nav a {float:left; display:block; color:white; padding:14px 20px; text-decoration:none;}
        nav a:hover {background-color:#ddd; color:black;}
        .container {padding:20px;}
        form {max-width:500px; margin:auto; background:#fff; padding:20px; border:1px solid #ccc;}
        input, textarea {width:100%; padding:10px; margin:10px 0;}
        button {padding:10px 15px; background-color:#4CAF50; color:white; border:none; cursor:pointer;}
        button:hover {background-color:#45a049;}
    </style>
</head>
<body>

<header>
    <h1>Contact Us</h1>
</header>

<nav>
    <a href="home.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Get in Touch</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Your Name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Your Email" required>

        <label for="message">Message:</label>
        <textarea id="message" placeholder="Your Message" rows="5" required></textarea>

        <button type="submit.html">Submit</button>
    </form>
</div>

</body>
</html>
