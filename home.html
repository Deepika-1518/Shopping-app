<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - My Shopping Site</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background-color:#f5f5f5; color:#333;}
        header {background-color:#4CAF50; color:white; text-align:center; padding:20px;}
        nav {background-color:#333; overflow:hidden;}
        nav a {float:left; display:block; color:white; padding:14px 20px; text-decoration:none;}
        nav a:hover {background-color:#ddd; color:black;}
        .container {padding:20px;}
        .hero {background-color:#e0f7fa; text-align:center; padding:30px; margin-bottom:20px;}
        .top-deals {display:flex; gap:20px; flex-wrap:wrap;}
        .deal-item {flex:1; min-width:150px; background-color:#fff; padding:10px; border:1px solid #ccc; text-align:center;}
        .product-box {width:100px; height:100px; background-color:#bbb; display:inline-block; line-height:100px; color:white; margin-bottom:10px;}
        button {padding:8px 12px; background-color:#4CAF50; color:white; border:none; cursor:pointer;}
        button:hover {background-color:#45a049;}
    </style>
</head>
<body>

<header>
    <h1>My Shopping Site</h1>
    <p>Welcome to our online store!</p>
</header>

<nav>
    <a href="home.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Shopping Site!</h2>
        <p>Discover amazing products at unbeatable prices. Shop the latest trends in fashion, electronics, and more!</p>
        <button>Shop Now</button>
    </section>

    <!-- Top Deals -->
    <h2>Top Deals of the Week</h2>
    <div class="top-deals">
        <div class="deal-item">
            <h4>T-Shirt</h4>
            <p>₹499 only</p>
            <button>Buy Now</button>
        </div>
        <div class="deal-item">
            <h4>Dress</h4>
            <p>₹899 only</p>
            <button>Buy Now</button>
        </div>
        <div class="deal-item">
            <h4>Mobile</h4>
            <p>₹12,999 only</p>
            <button>Buy Now</button>
        </div>
    </div>
</div>

</body>
</html>
