<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - My Shopping Site</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background-color:#f5f5f5; color:#333;}
        header {background-color:#4CAF50; color:white; text-align:center; padding:20px;}
        nav {background-color:#333; overflow:hidden;}
        nav a {float:left; display:block; color:white; padding:14px 20px; text-decoration:none;}
        nav a:hover {background-color:#ddd; color:black;}
        .container {padding:20px;}
        table {width:100%; border-collapse:collapse; margin-top:20px;}
        table, th, td {border:1px solid #ccc;}
        th, td {padding:10px; text-align:center;}
        button {padding:5px 10px; background-color:#4CAF50; color:white; border:none; cursor:pointer;}
        button:hover {background-color:#45a049;}
    </style>
</head>
<body>

<header>
    <h1>Your Cart</h1>
</header>

<nav>
    <a href="home.html">Home</a>
    <a href="categories.html">Categories</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Items in Your Cart</h2>
    <table>
        <tr>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Remove</th>
        </tr>
        <tr>
            <td>T-Shirt</td>
            <td>1</td>
            <td>₹499</td>
            <td><button>Remove</button></td>
        </tr>
        <tr>
            <td>Dress</td>
            <td>2</td>
            <td>₹1,798</td>
            <td><button>Remove</button></td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td>1</td>
            <td>₹12,999</td>
            <td><button>Remove</button></td>
        </tr>
    </table>
    <h3>Total: ₹15,296</h3>
    <button>Proceed to Checkout</button>
</div>

</body>
</html>
